name: Semesterspend
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Semesterspend:
    type: application
    platform: iOS
    sources:
      - path: Semesterspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.semesterspend
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Semesterspend
    info:
      path: Semesterspend/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
  SemesterspendTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SemesterspendTests
    dependencies:
      - target: Semesterspend
  SemesterspendUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SemesterspendUITests
    dependencies:
      - target: Semesterspend
schemes:
  Semesterspend:
    build:
      targets:
        Semesterspend: all
    test:
      targets:
        - SemesterspendTests
        - SemesterspendUITests
